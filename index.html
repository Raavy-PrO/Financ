<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Finanças</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase compat (funciona no WebView) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#1f2937;
--primary:#3b82f6;
--danger:#ef4444;
--success:#10b981;
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#e5e7eb;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:14px;
margin-top:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:var(--primary);
color:white;
border:none;
cursor:pointer;
}

.logout{
background:#64748b;
}

.gasto{
background:var(--danger);
}

.saldo{
font-size:32px;
font-weight:bold;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
}

.verde{color:var(--success)}
.vermelho{color:var(--danger)}

.hidden{
display:none;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

ul{
list-style:none;
padding:0;
}

li{
display:flex;
justify-content:space-between;
margin-top:6px;
font-size:14px;
}

</style>

</head>

<body>

<div id="login" class="container">

<h2>Login</h2>

<input id="usuario" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar conta</button>

</div>


<div id="app" class="container hidden">

<div class="topbar">

<h2>Dashboard</h2>

<div>
<button onclick="tema()">🌙</button>
<button class="logout" onclick="logout()">Sair</button>
</div>

</div>


<div class="dashboard">

<div class="box">
Receitas
<div id="totalReceita" class="verde">R$0</div>
</div>

<div class="box">
Gastos
<div id="totalGasto" class="vermelho">R$0</div>
</div>

</div>


<div class="card">

Saldo

<div id="saldo" class="saldo">R$0</div>

</div>


<div class="card">

<h3>Adicionar Receita</h3>

<input id="receitaValor" type="number">

<button onclick="addReceita()">Adicionar</button>

</div>


<div class="card">

<h3>Adicionar Gasto</h3>

<input id="gastoValor" type="number">

<select id="categoria" onchange="outroCampo()">

<option>Comida</option>
<option>Transporte</option>
<option>Casa</option>
<option>Lazer</option>
<option>Outros</option>

</select>

<input id="outro" class="hidden" placeholder="Digite categoria">

<button class="gasto" onclick="addGasto()">Adicionar Gasto</button>

</div>


<div class="card">

<h3>Gráfico</h3>

<canvas id="grafico"></canvas>

</div>


<div class="card">

<h3>Histórico</h3>

<ul id="lista"></ul>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDta-NeJnd-9IVVjsJWE-VF1CYwm1FLK9c",
authDomain: "deliciacity-df6cf.firebaseapp.com",
databaseURL: "https://deliciacity-df6cf-default-rtdb.firebaseio.com",
projectId: "deliciacity-df6cf",
storageBucket: "deliciacity-df6cf.appspot.com",
messagingSenderId: "1087217649656",
appId: "1:1087217649656:web:712786d04ec1f3be33380d",
measurementId: "G-CGX6KB57FG"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let dados=[]
let grafico
let usuarioUID=null


function registrar(){

let email=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

auth.createUserWithEmailAndPassword(email,senha)

.then(()=>{

alert("Conta criada")

})

.catch(e=>alert(e.message))

}


function login(){

let email=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

auth.signInWithEmailAndPassword(email,senha)

.then(user=>{

usuarioUID=user.user.uid

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

carregarDados()

})

.catch(()=>alert("Login inválido"))

}


function logout(){

auth.signOut()

location.reload()

}


function tema(){

document.body.classList.toggle("dark")

}


function outroCampo(){

let cat=document.getElementById("categoria").value

if(cat==="Outros"){
document.getElementById("outro").classList.remove("hidden")
}else{
document.getElementById("outro").classList.add("hidden")
}

}


function addReceita(){

let valor=Number(document.getElementById("receitaValor").value)

dados.push({
tipo:"receita",
valor:valor,
data:new Date().toLocaleDateString()
})

salvar()

}


function addGasto(){

let valor=Number(document.getElementById("gastoValor").value)

let cat=document.getElementById("categoria").value

if(cat==="Outros"){
cat=document.getElementById("outro").value
}

dados.push({
tipo:"gasto",
valor:valor,
categoria:cat,
data:new Date().toLocaleDateString()
})

salvar()

}


function salvar(){

db.ref("usuarios/"+usuarioUID+"/dados").push(dados[dados.length-1])

}


function carregarDados(){

db.ref("usuarios/"+usuarioUID+"/dados")

.on("value",(snapshot)=>{

dados=[]

snapshot.forEach(child=>{

dados.push(child.val())

})

atualizar()

})

}


function atualizar(){

let saldo=0
let receita=0
let gasto=0
let categorias={}

let lista=document.getElementById("lista")
lista.innerHTML=""

dados.forEach(d=>{

if(d.tipo==="receita"){
saldo+=d.valor
receita+=d.valor
}else{
saldo-=d.valor
gasto+=d.valor

if(!categorias[d.categoria])categorias[d.categoria]=0
categorias[d.categoria]+=d.valor
}

let li=document.createElement("li")
li.innerHTML=`${d.data} ${d.tipo} R$${d.valor}`

lista.appendChild(li)

})

document.getElementById("saldo").innerText="R$"+saldo.toFixed(2)
document.getElementById("totalReceita").innerText="R$"+receita
document.getElementById("totalGasto").innerText="R$"+gasto

desenharGrafico(categorias)

}


function desenharGrafico(cat){

let ctx=document.getElementById("grafico")

if(grafico)grafico.destroy()

grafico=new Chart(ctx,{
type:"doughnut",
data:{
labels:Object.keys(cat),
datasets:[{data:Object.values(cat)}]
}
})

}

</script>

</body>
</html>
