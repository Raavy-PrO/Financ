<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finanças</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--green:#22c55e;
--red:#ef4444;
}

.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#111;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.container{
max-width:480px;
margin:auto;
padding:16px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
margin-bottom:10px;
}

.card{
background:var(--card);
padding:20px;
border-radius:16px;
margin-top:15px;
animation:fadeUp .4s ease;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.cards-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.saldo{
font-size:30px;
font-weight:bold;
}

.receita{
color:var(--green);
}

.gasto{
color:var(--red);
}

#extrato{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:8px;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(min-width:700px){

.container{
max-width:700px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h2>Dashboard</h2>

<div>
<button onclick="toggleTheme()">🌙</button>
<button onclick="logout()">Sair</button>
</div>

</div>

<div class="cards-grid">

<div class="card">
<h3>Receitas</h3>
<p id="receitas" class="receita">R$0</p>
</div>

<div class="card">
<h3>Gastos</h3>
<p id="gastos" class="gasto">R$0</p>
</div>

</div>

<div class="card">
<h3>Saldo</h3>
<p class="saldo" id="saldo">R$0</p>
</div>

<div class="card">
<h3>Resumo</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>Adicionar Receita</h3>

<input id="valorReceita" placeholder="Valor">

<button onclick="addReceita()">Adicionar</button>

</div>

<div class="card">
<h3>Adicionar Gasto</h3>

<input id="valorGasto" placeholder="Valor">

<button onclick="addGasto()">Adicionar</button>

</div>

<div class="card">
<h3>Extrato</h3>

<div id="extrato"></div>

</div>

</div>

<script>

let receitas=0
let gastos=0
let historico=[]

const ctx=document.getElementById("grafico")

const chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Receitas","Gastos"],
datasets:[{
data:[0,0]
}]
},
options:{
responsive:true,
animation:{
duration:800
}
}
})

function atualizar(){

document.getElementById("receitas").innerText="R$"+receitas
document.getElementById("gastos").innerText="R$"+gastos

const saldo=receitas-gastos

document.getElementById("saldo").innerText="R$"+saldo

chart.data.datasets[0].data=[receitas,gastos]
chart.update()

localStorage.setItem("receitas",receitas)
localStorage.setItem("gastos",gastos)
localStorage.setItem("historico",JSON.stringify(historico))

}

function addReceita(){

const valor=parseFloat(document.getElementById("valorReceita").value)

if(!valor)return

receitas+=valor

historico.unshift({
tipo:"receita",
valor:valor,
data:new Date().toLocaleDateString()
})

renderExtrato()

document.getElementById("valorReceita").value=""

atualizar()

}

function addGasto(){

const valor=parseFloat(document.getElementById("valorGasto").value)

if(!valor)return

gastos+=valor

historico.unshift({
tipo:"gasto",
valor:valor,
data:new Date().toLocaleDateString()
})

renderExtrato()

document.getElementById("valorGasto").value=""

atualizar()

}

function renderExtrato(){

const extrato=document.getElementById("extrato")

extrato.innerHTML=""

historico.forEach(item=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
<span>${item.data}</span>
<b class="${item.tipo}">
${item.tipo=="receita"?"+":"-"}R$${item.valor}
</b>
`

extrato.appendChild(div)

})

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function logout(){

alert("Logout realizado")

}

function carregar(){

receitas=parseFloat(localStorage.getItem("receitas"))||0
gastos=parseFloat(localStorage.getItem("gastos"))||0
historico=JSON.parse(localStorage.getItem("historico"))||[]

renderExtrato()

atualizar()

}

carregar()

</script>

</body>
</html>
