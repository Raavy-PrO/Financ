<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanças Pessoais</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;transition:background .3s,color .3s,border-color .3s}

body{
font-family:Segoe UI,'Helvetica Neue',sans-serif;
margin:0;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
color:#1f2937
}

/* ── DARK MODE ── */
body.dark{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:#e5e7eb
}

body.dark .loginCard,
body.dark .box,
body.dark .card{
background:linear-gradient(135deg,#1f2937,#111827);
border-color:rgba(255,255,255,.08);
color:#e5e7eb
}

body.dark .box h3{color:#9ca3af}
body.dark .card h3{color:#e5e7eb}

body.dark .loginCard input,
body.dark .card input,
body.dark .card select{
background:#111827;
border-color:#374151;
color:#e5e7eb
}

body.dark .loginCard input:focus,
body.dark .card input:focus,
body.dark .card select:focus{
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,.15)
}

body.dark li{border-bottom-color:#374151}
body.dark li:hover{background:#1f2937}
body.dark span{color:#e5e7eb}

body.dark #emailUser{color:#e5e7eb}

/* ── TEMA TOGGLE BUTTON ── */
.btn-tema{
position:fixed;
top:15px;
right:15px;
z-index:999;
background:rgba(255,255,255,.2);
border:2px solid rgba(255,255,255,.4);
backdrop-filter:blur(10px);
color:white;
font-size:20px;
width:46px;
height:46px;
border-radius:50%;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 15px rgba(0,0,0,.2);
transition:all .3s ease
}

.btn-tema:hover{
transform:scale(1.1) rotate(20deg);
box-shadow:0 8px 25px rgba(0,0,0,.3)
}

.hidden{display:none}

.loginBox{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px
}

.loginCard{
background:white;
padding:40px;
border-radius:20px;
width:100%;
max-width:380px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.15);
backdrop-filter:blur(10px)
}

.loginCard h2{
margin:0 0 30px 0;
color:#1f2937;
font-size:28px
}

body.dark .loginCard h2{color:#e5e7eb}

.loginCard input{
width:100%;
margin-top:15px;
padding:15px;
border-radius:12px;
border:2px solid #e5e7eb;
font-size:16px;
transition:all .3s ease;
background:#f9fafb
}

.loginCard input:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.1)
}

.loginCard button{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all .3s ease;
letter-spacing:.5px
}

.btn-primary{
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
box-shadow:0 4px 15px rgba(59,130,246,.3)
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(59,130,246,.4)
}

.btn-success{
background:linear-gradient(135deg,#10b981,#059669);
color:white;
box-shadow:0 4px 15px rgba(16,185,129,.3)
}

.btn-success:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(16,185,129,.4)
}

.container{
max-width:450px;
margin:auto;
padding:20px;
padding-bottom:100px
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:25px
}

.box{
background:linear-gradient(135deg,white,#f8fafc);
padding:25px 20px;
border-radius:16px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.08);
border:1px solid rgba(255,255,255,.5);
backdrop-filter:blur(10px);
transition:all .3s ease
}

.box:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,.12)
}

.box h3{
margin:0 0 15px 0;
font-size:14px;
color:#6b7280;
font-weight:500;
text-transform:uppercase;
letter-spacing:.5px
}

.box .valor{
font-size:28px;
font-weight:700;
margin:0;
line-height:1.2
}

.verde{color:#10b981}
.vermelho{color:#ef4444}
.ciano{color:#06b6d4}

.card{
background:linear-gradient(135deg,white,#f8fafc);
padding:25px;
border-radius:16px;
margin-top:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
border:1px solid rgba(255,255,255,.5);
backdrop-filter:blur(10px)
}

.card h3{
margin:0 0 20px 0;
color:#1f2937;
font-size:20px;
display:flex;
align-items:center;
gap:10px
}

.card input,.card select{
width:100%;
padding:15px;
margin-top:12px;
border-radius:12px;
border:2px solid #e5e7eb;
font-size:16px;
background:#f9fafb;
transition:all .3s ease
}

.card input:focus,.card select:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.1)
}

.card button{
width:100%;
margin-top:15px;
padding:15px;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all .3s ease;
letter-spacing:.5px
}

.card button:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(59,130,246,.4)
}

ul{list-style:none;padding:0;margin:0}

li{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:2px solid #f3f4f6;
transition:all .2s ease
}

li:hover{
background:#f9fafb;
border-radius:12px;
transform:translateX(5px)
}

li:last-child{border-bottom:none}

span{
font-weight:500;
color:#1f2937
}

.del{
border:none;
background:none;
color:#ef4444;
font-size:20px;
cursor:pointer;
padding:5px;
border-radius:8px;
transition:all .2s ease
}

.del:hover{
background:#fef2f2;
transform:scale(1.1)
}

.grafico-container{
height:250px;
margin-top:15px
}

.btn-logout{
width:100%;
margin-top:20px;
padding:15px;
background:linear-gradient(135deg,#6b7280,#4b5563);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all .3s ease
}

.btn-logout:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(107,114,128,.4)
}

footer{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
text-align:center;
padding:15px;
font-weight:500;
box-shadow:0 -4px 20px rgba(0,0,0,.1);
font-size:14px
}

body.dark footer{
background:linear-gradient(135deg,#1e1b4b,#312e81)
}

@media (max-width:480px){
.container{padding:15px}
.dashboard{grid-template-columns:1fr;gap:12px}
.loginCard{padding:30px 25px}
}
</style>
</head>

<body>

<!-- BOTÃO TEMA (sempre visível) -->
<button class="btn-tema" onclick="alternarTema()" id="btnTema">🌙</button>

<!-- LOGIN -->
<div id="login" class="loginBox">
  <div class="loginCard">
    <h2>💰 Controle Financeiro</h2>
    <input id="email" placeholder="📧 Email" autocomplete="email">
    <input id="senha" type="password" placeholder="🔒 Senha" autocomplete="current-password">
    <button class="btn-primary" onclick="login()">Entrar</button>
    <button class="btn-success" onclick="registrar()">Criar Conta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="container hidden">
  <h3 id="emailUser" style="text-align:center;color:#1f2937;margin-bottom:20px;font-size:18px"></h3>

  <div class="dashboard">
    <div class="box">
      <h3>Saldo Atual</h3>
      <div id="saldo" class="valor ciano">R$ 0,00</div>
    </div>
    <div class="box">
      <h3>Total Receitas</h3>
      <div id="totalReceita" class="valor verde">R$ 0,00</div>
    </div>
    <div class="box">
      <h3>Total Gastos</h3>
      <div id="totalGasto" class="valor vermelho">R$ 0,00</div>
    </div>
  </div>

  <div class="card">
    <h3>💵 Nova Receita</h3>
    <input id="receitaDesc" placeholder="Descrição da receita">
    <input id="receitaValor" type="number" step="0.01" placeholder="0,00" min="0">
    <button onclick="addReceita()">➕ Adicionar Receita</button>
  </div>

  <div class="card">
    <h3>💸 Novo Gasto</h3>
    <input id="gastoDesc" placeholder="Descrição do gasto">
    <input id="gastoValor" type="number" step="0.01" placeholder="0,00" min="0">
    <select id="categoria">
      <option value="Comida">🍔 Comida</option>
      <option value="Transporte">🚗 Transporte</option>
      <option value="Casa">🏠 Casa</option>
      <option value="Lazer">🎮 Lazer</option>
      <option value="Outros">📦 Outros</option>
    </select>
    <button onclick="addGasto()">➖ Adicionar Gasto</button>
  </div>

  <div class="card">
    <h3>📊 Gráfico de Gastos</h3>
    <div class="grafico-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>📋 Extrato Completo</h3>
    <ul id="lista"></ul>
  </div>

  <button class="btn-logout" onclick="logout()">🚪 Sair</button>
</div>

<footer>
  ✨ Finanças Pessoais - Gerencie seu dinheiro com inteligência ✨
</footer>

<script>
const firebaseConfig={
  apiKey:"AIzaSyDta-NeJnd-9IVVjsJWE-VF1CYwm1FLK9c",
  authDomain:"deliciacity-df6cf.firebaseapp.com",
  databaseURL:"https://deliciacity-df6cf-default-rtdb.firebaseio.com",
  projectId:"deliciacity-df6cf"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let uid=null;
let dados=[];
let grafico=null;

const loginBox    = document.getElementById("login");
const appBox      = document.getElementById("app");
const lista       = document.getElementById("lista");
const totalReceita= document.getElementById("totalReceita");
const totalGasto  = document.getElementById("totalGasto");
const saldo       = document.getElementById("saldo");
const emailUser   = document.getElementById("emailUser");
const receitaDesc = document.getElementById("receitaDesc");
const receitaValor= document.getElementById("receitaValor");
const gastoDesc   = document.getElementById("gastoDesc");
const gastoValor  = document.getElementById("gastoValor");
const categoria   = document.getElementById("categoria");
const btnTema     = document.getElementById("btnTema");

/* ── TEMA ── */
function alternarTema(){
  const isDark = document.body.classList.toggle("dark");
  btnTema.textContent = isDark ? "☀️" : "🌙";
  localStorage.setItem("tema", isDark ? "dark" : "light");
  if(grafico) graficoAtualizar();
}

// Restaura tema salvo
(function(){
  if(localStorage.getItem("tema")==="dark"){
    document.body.classList.add("dark");
    btnTema.textContent="☀️";
  }
})();

function formatar(v){
  return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
}

auth.onAuthStateChanged(user=>{
  if(user){
    uid=user.uid;
    emailUser.innerText=`Olá, ${user.email}`;
    loginBox.style.display="none";
    appBox.style.display="block";
    carregar();
  }else{
    loginBox.style.display="flex";
    appBox.style.display="none";
  }
});

function login(){
  const email=document.getElementById("email").value.trim();
  const senha=document.getElementById("senha").value;
  if(!email || !senha) return alert("Preencha email e senha!");
  auth.signInWithEmailAndPassword(email,senha)
    .catch(e=>alert("Erro no login: "+e.message));
}

function registrar(){
  const email=document.getElementById("email").value.trim();
  const senha=document.getElementById("senha").value;
  if(!email || !senha || senha.length<6) return alert("Senha deve ter pelo menos 6 caracteres!");
  auth.createUserWithEmailAndPassword(email,senha)
    .catch(e=>alert("Erro no registro: "+e.message));
}

function logout(){
  auth.signOut();
}

function carregar(){
  if(!uid) return;
  db.ref("dados/"+uid).on("value",snap=>{
    dados=[];
    lista.innerHTML="";
    let receita=0;
    let gasto=0;

    snap.forEach(i=>{
      let d=i.val();
      let key=i.key;
      dados.push({...d,key});

      let li=document.createElement("li");
      const emoji = d.tipo==="receita" ? "💰" : "💸";
      li.innerHTML=`
        <span>${emoji} ${d.descricao} | ${formatar(d.valor)}</span>
        <button class="del" onclick="deletar('${key}')">🗑</button>
      `;
      lista.appendChild(li);

      if(d.tipo==="receita") receita+=parseFloat(d.valor);
      else gasto+=parseFloat(d.valor);
    });

    totalReceita.innerText=formatar(receita);
    totalGasto.innerText=formatar(gasto);
    saldo.innerText=formatar(receita-gasto);

    graficoAtualizar();
  });
}

function addReceita(){
  const valor=Number(receitaValor.value);
  const desc=receitaDesc.value.trim() || "Receita";
  if(!valor || valor<=0) return alert("Digite um valor válido!");
  db.ref("dados/"+uid).push({
    tipo:"receita",
    valor:valor,
    descricao:desc,
    data:new Date().toISOString()
  });
  receitaValor.value="";
  receitaDesc.value="";
}

function addGasto(){
  const valor=Number(gastoValor.value);
  const desc=gastoDesc.value.trim() || "Gasto";
  const cat=categoria.value;
  if(!valor || valor<=0) return alert("Digite um valor válido!");
  db.ref("dados/"+uid).push({
    tipo:"gasto",
    valor:valor,
    descricao:desc,
    categoria:cat,
    data:new Date().toISOString()
  });
  gastoValor.value="";
  gastoDesc.value="";
}

function deletar(key){
  if(confirm("Deseja realmente excluir este item?")){
    db.ref("dados/"+uid+"/"+key).remove();
  }
}

function graficoAtualizar(){
  const cat={};
  dados.forEach(d=>{
    if(d.tipo==="gasto"){
      cat[d.categoria]=(cat[d.categoria]||0)+parseFloat(d.valor);
    }
  });

  const ctx=document.getElementById("grafico");
  if(grafico) grafico.destroy();

  const isDark=document.body.classList.contains("dark");
  const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

  grafico=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:Object.keys(cat),
      datasets:[{
        data:Object.values(cat),
        backgroundColor:colors.slice(0,Object.keys(cat).length),
        borderWidth:0,
        hoverOffset:10
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{
          position:'bottom',
          labels:{
            padding:20,
            usePointStyle:true,
            font:{size:12},
            color: isDark ? "#e5e7eb" : "#1f2937"
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
