<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanças</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-LQ1/L3vJkMk2ZJxZf3qCIRkpZlTpXKXgQMF6nRr+zMxWZkYVv/m1LJ7K+Tv4zD2hRZyZ0WQxf4YIYzGjk5JvZw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

<div id="login" class="loginBox">
  <div class="loginCard">
    <h2>Controle Financeiro</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <button onclick="registrar()">Criar conta</button>
  </div>
</div>

<div id="app" class="container hidden">

  <div class="topbar">

    <button id="temaBtn" onclick="tema()"><i class="fas fa-moon"></i></button>

    <div class="perfil">
      <img src="https://i.pravatar.cc/40" alt="perfil" class="fotoPerfil">
      <div class="infoPerfil">
        <span id="emailUser" class="email"></span>
        <i class="fas fa-sign-out-alt" onclick="logout()" title="Sair"></i>
      </div>
    </div>

  </div>

  <div class="card">
    Saldo
    <h1 id="saldo">R$0</h1>
  </div>

  <div class="card">
    <h3>Receita</h3>
    <input id="receitaValor" type="number">
    <button onclick="addReceita()">Adicionar</button>
  </div>

  <div class="card">
    <h3>Gasto</h3>
    <input id="gastoValor" type="number">
    <select id="categoria">
      <option>Comida</option>
      <option>Transporte</option>
      <option>Casa</option>
      <option>Lazer</option>
    </select>
    <button onclick="addGasto()">Adicionar</button>
  </div>

  <div class="card">
    <canvas id="grafico"></canvas>
  </div>

  <div class="card">
    <h3>Extrato</h3>
    <ul id="lista"></ul>
  </div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
