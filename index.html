<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Financeiro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- TELA DE LOGIN -->

<div id="login">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar conta</button>

</div>


<!-- APP PRINCIPAL -->

<div id="app" class="hidden">

<header>

<h2>Dashboard</h2>

<div>

<button onclick="trocarTema()">🌗 Tema</button>
<button onclick="logout()">Logout</button>

</div>

</header>


<!-- DASHBOARD -->

<section class="dashboard">

<div class="box">

Receitas

<span id="receitas">R$0</span>

</div>

<div class="box">

Gastos

<span id="gastos">R$0</span>

</div>

</section>


<!-- SALDO -->

<section class="saldo">

Saldo

<h1 id="saldo">R$0</h1>

</section>


<!-- ADICIONAR RECEITA -->

<section class="card">

<h3>Adicionar Receita</h3>

<input id="valorReceita" type="number">

<button onclick="addReceita()">Adicionar</button>

</section>


<!-- ADICIONAR GASTO -->

<section class="card">

<h3>Adicionar Gasto</h3>

<input id="valorGasto" type="number">

<select id="categoria" onchange="mostrarOutro()">

<option>Comida</option>
<option>Transporte</option>
<option>Casa</option>
<option>Lazer</option>
<option>Outros</option>

</select>

<input id="categoriaOutro" class="hidden" placeholder="Digite categoria">

<button onclick="addGasto()">Adicionar gasto</button>

</section>


<!-- GRÁFICO -->

<section class="card">

<canvas id="grafico"></canvas>

</section>


<!-- HISTÓRICO -->

<section class="card">

<ul id="historico"></ul>

</section>

</div>

<script src="app.js"></script>

</body>

</html>
