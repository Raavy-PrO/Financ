<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Finanças</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-top:15px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#3b82f6;
color:white;
border:none;
}

.hidden{
display:none;
}

ul{
list-style:none;
padding:0;
}

li{
display:flex;
justify-content:space-between;
margin-top:5px;
}

</style>

</head>

<body>

<div id="login" class="container">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar conta</button>

</div>


<div id="app" class="container hidden">

<h2>Dashboard</h2>

<div class="card">

Saldo
<h1 id="saldo">R$0</h1>

</div>

<div class="card">

<h3>Receita</h3>

<input id="receitaValor" type="number">

<button onclick="addReceita()">Adicionar</button>

</div>

<div class="card">

<h3>Gasto</h3>

<input id="gastoValor" type="number">

<select id="categoria">
<option>Comida</option>
<option>Transporte</option>
<option>Casa</option>
<option>Lazer</option>
</select>

<button onclick="addGasto()">Adicionar</button>

</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">

<h3>Histórico</h3>
<ul id="lista"></ul>

</div>

<button onclick="logout()">Sair</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDta-NeJnd-9IVVjsJWE-VF1CYwm1FLK9c",
authDomain: "deliciacity-df6cf.firebaseapp.com",
databaseURL: "https://deliciacity-df6cf-default-rtdb.firebaseio.com",
projectId: "deliciacity-df6cf",
storageBucket: "deliciacity-df6cf.appspot.com",
messagingSenderId: "1087217649656",
appId: "1:1087217649656:web:712786d04ec1f3be33380d"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let uid=null
let dados=[]
let grafico=null


auth.onAuthStateChanged(user=>{

if(user){

uid=user.uid

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

carregar()

}

})


function registrar(){

let email=document.getElementById("email").value
let senha=document.getElementById("senha").value

auth.createUserWithEmailAndPassword(email,senha)

.then(()=>alert("Conta criada"))

.catch(e=>alert(e.message))

}


function login(){

let email=document.getElementById("email").value
let senha=document.getElementById("senha").value

auth.signInWithEmailAndPassword(email,senha)

.catch(()=>alert("Erro no login"))

}


function logout(){

auth.signOut()

location.reload()

}


function addReceita(){

if(!uid) return alert("Faça login")

let valor=Number(document.getElementById("receitaValor").value)

if(!valor) return alert("Digite um valor")

let item={
tipo:"receita",
valor:valor,
data:new Date().toLocaleDateString()
}

db.ref("dados/"+uid).push(item)

}


function addGasto(){

if(!uid) return alert("Faça login")

let valor=Number(document.getElementById("gastoValor").value)
let cat=document.getElementById("categoria").value

if(!valor) return alert("Digite um valor")

let item={
tipo:"gasto",
valor:valor,
categoria:cat,
data:new Date().toLocaleDateString()
}

db.ref("dados/"+uid).push(item)

}


function carregar(){

db.ref("dados/"+uid).on("value",snap=>{

dados=[]

snap.forEach(i=>{

dados.push(i.val())

})

atualizar()

})

}


function atualizar(){

let saldo=0
let categorias={}
let lista=document.getElementById("lista")

lista.innerHTML=""

dados.forEach(d=>{

if(d.tipo==="receita"){
saldo+=d.valor
}else{

saldo-=d.valor

if(!categorias[d.categoria]) categorias[d.categoria]=0

categorias[d.categoria]+=d.valor

}

let li=document.createElement("li")

li.innerHTML=d.data+" R$"+d.valor

lista.appendChild(li)

})

document.getElementById("saldo").innerText="R$"+saldo.toFixed(2)

graficoFunc(categorias)

}


function graficoFunc(cat){

let ctx=document.getElementById("grafico")

if(grafico) grafico.destroy()

grafico=new Chart(ctx,{
type:"pie",
data:{
labels:Object.keys(cat),
datasets:[{
data:Object.values(cat)
}]
}
})

}

</script>

</body>
</html>
