<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanças</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
*{box-sizing:border-box;}
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f5f6fb;
  color:#1f2937;
  transition:0.3s;
}
.dark{background:#0f172a;color:white;}
.container{max-width:420px;margin:auto;padding:20px;}
.loginBox{height:100vh;display:flex;justify-content:center;align-items:center;}
.loginCard{
  background:white;padding:30px;border-radius:14px;width:100%;max-width:350px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;transition:0.3s;
}
.dark .loginCard{background:#1e293b;}
.loginCard h2{margin-bottom:20px;}
.loginCard input{width:100%;margin-top:10px;padding:12px;border-radius:8px;font-size:14px;border:1px solid #ccc;}
.dark input{background:#0f172a;color:white;border:1px solid #444;}
.loginCard button{width:100%;margin-top:10px;padding:12px;border-radius:8px;font-size:14px;border:none;cursor:pointer;background:#3b82f6;color:white;transition:0.3s;}
.loginCard button:hover{background:#2563eb;}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;gap:10px;}
.iconBtn{background:#3b82f6;color:white;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:0.3s;}
.iconBtn:hover{background:#2563eb;}
.perfil{display:flex;align-items:center;background:#e0e0e0;border-radius:30px;padding:5px 10px;gap:10px;}
.dark .perfil{background:#1e293b;}
.fotoPerfil{width:40px;height:40px;border-radius:50%;}
.infoPerfil{display:flex;align-items:center;gap:10px;}
.email{font-size:14px;opacity:0.9;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* CARDS */
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
.box{background:white;padding:15px;border-radius:12px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,0.08);transition:transform 0.3s, box-shadow 0.3s;}
.dark .box{background:#1e293b;}
.box:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,0.15);}
.verde{color:#10b981;}
.vermelho{color:#ef4444;}
.saldo{font-size:28px;font-weight:bold;}
.card{background:white;padding:20px;border-radius:12px;margin-top:15px;transition:0.3s;box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.dark .card{background:#1e293b;}
.card input,.card select{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid #ccc;}
.dark .card input,.dark .card select{background:#0f172a;color:white;border:1px solid #444;}
.card button{background:#3b82f6;color:white;border:none;cursor:pointer;transition:0.3s;}
.card button:hover{background:#2563eb;}
ul{list-style:none;padding:0;}
li{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.del{background:transparent;border:none;cursor:pointer;color:#ef4444;font-size:16px;}

/* RESPONSIVO */
@media (max-width: 480px){
  .container{padding:10px;}
  .card{padding:15px;}
  .topbar{flex-direction:column;align-items:flex-start;}
  .dashboard{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="loginBox">
  <div class="loginCard">
    <h2>Controle Financeiro</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <button onclick="registrar()">Criar conta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="container hidden" style="display:none;">

<div class="topbar">
  <button class="iconBtn" onclick="tema()" title="Tema"><i class="fas fa-moon"></i> Tema</button>
  <div class="perfil">
    <img src="https://i.pravatar.cc/40" alt="perfil" class="fotoPerfil">
    <div class="infoPerfil">
      <span id="emailUser" class="email"></span>
      <button class="iconBtn" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
  </div>
</div>

<div class="dashboard">
  <div class="box">
    <div>Saldo</div>
    <div id="saldo" class="saldo">R$0</div>
  </div>
  <div class="box">
    <div>Receitas</div>
    <div id="totalReceita" class="verde">R$0</div>
  </div>
  <div class="box">
    <div>Gastos</div>
    <div id="totalGasto" class="vermelho">R$0</div>
  </div>
</div>

<div class="card">
<h3>Adicionar Receita</h3>
<input id="receitaValor" type="number" placeholder="Valor">
<button onclick="addReceita()"><i class="fas fa-plus"></i> Adicionar</button>
</div>

<div class="card">
<h3>Adicionar Gasto</h3>
<input id="gastoValor" type="number" placeholder="Valor">
<select id="categoria">
<option>Comida</option>
<option>Transporte</option>
<option>Casa</option>
<option>Lazer</option>
</select>
<button onclick="addGasto()"><i class="fas fa-plus"></i> Adicionar</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>Extrato</h3>
<ul id="lista"></ul>
</div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyDta-NeJnd-9IVVjsJWE-VF1CYwm1FLK9c",
authDomain: "deliciacity-df6cf.firebaseapp.com",
databaseURL: "https://deliciacity-df6cf-default-rtdb.firebaseio.com",
projectId: "deliciacity-df6cf",
storageBucket: "deliciacity-df6cf.appspot.com",
messagingSenderId: "1087217649656",
appId: "1:1087217649656:web:712786d04ec1f3be33380d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let uid=null;
let dados=[];
let grafico=null;

// manter tema
if(localStorage.getItem("tema")=="dark") document.body.classList.add("dark");

// verificar login
auth.onAuthStateChanged(user=>{
  if(user){
    uid=user.uid;
    document.getElementById("emailUser").innerText=user.email;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    carregar();
  }
});

function registrar(){
  let email=document.getElementById("email").value;
  let senha=document.getElementById("senha").value;
  if(!email||!senha){alert("Digite email e senha");return;}
  auth.createUserWithEmailAndPassword(email,senha)
  .then(()=>alert("Conta criada"))
  .catch(e=>alert(e.message));
}

function login(){
  let email=document.getElementById("email").value;
  let senha=document.getElementById("senha").value;
  if(!email||!senha){alert("Digite email e senha");return;}
  auth.signInWithEmailAndPassword(email,senha)
  .catch(()=>alert("Erro no login"));
}

function logout(){
  auth.signOut();
  location.reload();
}

function tema(){
  document.body.classList.toggle("dark");
  if(document.body.classList.contains("dark")) localStorage.setItem("tema","dark");
  else localStorage.setItem("tema","light");
}

function addReceita(){
  if(!uid) return;
  let valor=Number(document.getElementById("receitaValor").value);
  if(!valor) return alert("Digite um valor");
  let item={tipo:"receita",valor:valor,data:new Date().toLocaleDateString()};
  db.ref("dados/"+uid).push(item);
}

function addGasto(){
  if(!uid) return;
  let valor=Number(document.getElementById("gastoValor").value);
  let cat=document.getElementById("categoria").value;
  if(!valor) return alert("Digite um valor");
  let item={tipo:"gasto",valor:valor,categoria:cat,data:new Date().toLocaleDateString()};
  db.ref("dados/"+uid).push(item);
}

function deletar(id){
  db.ref("dados/"+uid+"/"+id).remove();
}

function carregar(){
  db.ref("dados/"+uid).on("value",snap=>{
    dados=[];
    let lista=document.getElementById("lista");
    lista.innerHTML="";
    let totalR=0,totalG=0;
    snap.forEach(i=>{
      let d=i.val();
      let key=i.key;
      dados.push(d);
      let li=document.createElement("li");
      li.innerHTML=`<span>${d.data} R$${d.valor}</span>
                     <button class="del" onclick="deletar('${key}')"><i class="fas fa-trash"></i></button>`;
      lista.appendChild(li);
      if(d.tipo==="receita") totalR+=d.valor;
      else totalG+=d.valor;
    });
    document.getElementById("totalReceita").innerText="R$"+totalR.toFixed(2);
    document.getElementById("totalGasto").innerText="R$"+totalG.toFixed(2);
    atualizar();
  });
}

function atualizar(){
  let saldo=0;
  let categorias={};
  dados.forEach(d=>{
    if(d.tipo==="receita") saldo+=d.valor;
    else{
      saldo-=d.valor;
      if(!categorias[d.categoria]) categorias[d.categoria]=0;
      categorias[d.categoria]+=d.valor;
    }
  });
  document.getElementById("saldo").innerText="R$"+saldo.toFixed(2);
  graficoFunc(categorias);
}

function graficoFunc(cat){
  let ctx=document.getElementById("grafico");
  if(grafico) grafico.destroy();
  grafico=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:Object.keys(cat),
      datasets:[{data:Object.values(cat),
                 backgroundColor:['#3b82f6','#ef4444','#10b981','#facc15','#8b5cf6']}]
    },
    options:{
      animation:{animateScale:true},
      responsive:true,
      plugins:{legend:{position:'bottom'}}
    }
  });
}
</script>
</body>
</html>
