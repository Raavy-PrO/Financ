<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finanças</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#820ad1;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
padding:18px;
border-radius:14px;
margin-top:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-size:15px;
}

button{
background:#820ad1;
color:white;
cursor:pointer;
}

.gasto{
background:#ef4444;
}

.saldo{
font-size:32px;
font-weight:bold;
}

.verde{color:#16a34a}
.vermelho{color:#dc2626}

ul{
list-style:none;
padding:0;
}

li{
display:flex;
justify-content:space-between;
margin-top:6px;
}

.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.login input{
max-width:300px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div id="loginTela" class="login">

<h2>💜 Minhas Finanças</h2>

<input id="nome" placeholder="Seu nome">

<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

</div>


<div id="app" class="container hidden">

<h2 id="boasVindas"></h2>

<div class="card">

Saldo

<div id="saldo" class="saldo">R$0</div>

</div>


<div class="card">

<h3>Receita</h3>

<input type="number" id="receitaValor" placeholder="Valor">

<button onclick="addReceita()">Adicionar</button>

</div>


<div class="card">

<h3>Gasto</h3>

<input type="number" id="gastoValor" placeholder="Valor">

<select id="categoria" onchange="mostrarOutro()">

<option>Comida</option>
<option>Transporte</option>
<option>Casa</option>
<option>Lazer</option>
<option>Outros</option>

</select>

<input id="outroCampo" class="hidden" placeholder="Qual gasto?">

<button class="gasto" onclick="addGasto()">Adicionar Gasto</button>

</div>


<div class="card">

<h3>Histórico</h3>

<ul id="lista"></ul>

</div>


<div class="card">

<h3>Gastos</h3>

<canvas id="grafico"></canvas>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("dados")) || []

let grafico

function entrar(){

let nome=document.getElementById("nome").value
let senha=document.getElementById("senha").value

if(!nome || !senha){

alert("Digite nome e senha")

return

}

localStorage.setItem("usuario",nome)

document.getElementById("loginTela").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

document.getElementById("boasVindas").innerText="Olá, "+nome

atualizar()

}

if(localStorage.getItem("usuario")){

document.getElementById("loginTela").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

document.getElementById("boasVindas").innerText="Olá, "+localStorage.getItem("usuario")

}

function dataHoje(){

return new Date().toISOString().split("T")[0]

}

function mostrarOutro(){

let categoria=document.getElementById("categoria").value

if(categoria==="Outros"){

document.getElementById("outroCampo").classList.remove("hidden")

}else{

document.getElementById("outroCampo").classList.add("hidden")

}

}

function addReceita(){

let valor=Number(document.getElementById("receitaValor").value)

if(!valor)return

dados.push({

tipo:"receita",
valor:valor,
data:dataHoje()

})

salvar()

}

function addGasto(){

let valor=Number(document.getElementById("gastoValor").value)

let categoria=document.getElementById("categoria").value

if(categoria==="Outros"){

categoria=document.getElementById("outroCampo").value

}

if(!valor)return

dados.push({

tipo:"gasto",
valor:valor,
categoria:categoria,
data:dataHoje()

})

salvar()

}

function salvar(){

localStorage.setItem("dados",JSON.stringify(dados))

atualizar()

}

function atualizar(){

let saldo=0

let lista=document.getElementById("lista")

lista.innerHTML=""

let categorias={}

dados.forEach((item,i)=>{

if(item.tipo==="receita"){

saldo+=item.valor

}else{

saldo-=item.valor

if(!categorias[item.categoria]){

categorias[item.categoria]=0

}

categorias[item.categoria]+=item.valor

}

let li=document.createElement("li")

li.innerHTML=`${item.data} ${item.tipo} R$${item.valor}`

lista.appendChild(li)

})

let saldoElemento=document.getElementById("saldo")

saldoElemento.innerText="R$"+saldo.toFixed(2)

saldoElemento.className="saldo "+(saldo>=0?"verde":"vermelho")

desenharGrafico(categorias)

}

function desenharGrafico(categorias){

let ctx=document.getElementById("grafico")

if(grafico)grafico.destroy()

grafico=new Chart(ctx,{

type:"doughnut",

data:{

labels:Object.keys(categorias),

datasets:[{

data:Object.values(categorias)

}]

}

})

}

atualizar()

</script>

</body>
</html>
